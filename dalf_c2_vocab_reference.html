
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:7px 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.panel{display:none}.panel.active{display:block}
.search{width:100%;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);margin-bottom:16px}
.search:focus{outline:none;border-color:var(--color-border-primary)}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px}
.word{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.def{font-size:13px;color:var(--color-text-secondary);margin-top:3px;line-height:1.5}
.ex{font-size:12.5px;color:var(--color-text-tertiary);margin-top:5px;font-style:italic;border-left:2px solid var(--color-border-tertiary);padding-left:8px;line-height:1.5}
.tag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;margin-right:4px;margin-top:5px}
.t-tone{background:var(--color-background-info);color:var(--color-text-info)}
.t-pos{background:var(--color-background-success);color:var(--color-text-success)}
.t-neg{background:var(--color-background-danger);color:var(--color-text-danger)}
.t-neut{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.hidden{display:none}
.count{font-size:12px;color:var(--color-text-tertiary);margin-bottom:12px}
</style>

<div style="padding:1rem 0">
<div class="tabs">
  <button class="tab active" onclick="switchTab('adj')">Adjectifs</button>
  <button class="tab" onclick="switchTab('conn')">Connecteurs & tournures</button>
</div>

<div id="adj" class="panel active">
  <input class="search" placeholder="Rechercher un adjectif ou une définition…" oninput="filterCards('adj',this.value)">
  <div class="count" id="adj-count"></div>
  <div class="grid" id="adj-grid"></div>
</div>

<div id="conn" class="panel">
  <input class="search" placeholder="Rechercher une expression…" oninput="filterCards('conn',this.value)">
  <div class="count" id="conn-count"></div>
  <div class="grid" id="conn-grid"></div>
</div>
</div>

<script>
const adjectifs = [

  {w:"incontournable",d:"dont on ne peut faire abstraction, s'impose",e:"La question du sens au travail est devenue incontournable.",tone:"neut"},
  {w:"fallacieux",d:"trompeur en apparence logique, qui induit en erreur",e:"Cet argument est séduisant mais fallacieux.",tone:"neg"},

  {w:"lacunaire",d:"incomplet, qui comporte des lacunes importantes",e:"L'analyse proposée demeure lacunaire sur la question sociale.",tone:"neg"},
  {w:"biaisé",d:"faussé par un préjugé ou un biais méthodologique",e:"Un sondage interne est nécessairement biaisé.",tone:"neg"},
  {w:"exorbitant",d:"excessif, qui dépasse les limites raisonnables",e:"Déléguer son bonheur à son employeur lui confère un pouvoir exorbitant.",tone:"neg"},

  {w:"tangible",d:"que l'on peut constater concrètement, réel et mesurable",e:"Les résultats tangibles de cette politique restent à démontrer.",tone:"neut"},

  {w:"par rapport à",d:"comparaison ou mise en relation avec un référent",e:"Par rapport aux générations précédentes, les attentes ont profondément changé.",tone:"neut"},

  {w:"à l'encontre de",d:"contre, en opposition directe à",e:"Cette politique va à l'encontre des intérêts des salariés.",tone:"neut"},

  {w:"nonobstant",d:"malgré, en dépit de (très soutenu)",e:"Nonobstant ces difficultés, des avancées réelles ont été réalisées.",tone:"neut"},
  {w:"à rebours de",d:"en sens contraire de, contre le courant de",e:"À rebours des idées reçues, le bonheur au travail est un enjeu sérieux.",tone:"neut"},
  {w:"partant",d:"par conséquent, donc (registre soutenu)",e:"La confiance est érodée, partant, toute réforme sera mal reçue.",tone:"neut"},
  {w:"il s'avère que",d:"il apparaît clairement que, il est avéré que",e:"Il s'avère que les mesures cosmétiques n'ont aucun effet durable.",tone:"neut"},
  {w:"en sus de",d:"en plus de, au-delà de",e:"En sus des avantages matériels, la reconnaissance symbolique compte.",tone:"neut"},
  {w:"au-delà de",d:"plus loin que, en dépassant le cadre de",e:"Au-delà du simple confort, c'est le sens qui est en jeu.",tone:"neut"},

  {w:"dès lors que",d:"à partir du moment où, du fait que",e:"Dès lors que le travail perd son sens, la démotivation s'installe.",tone:"neut"},
  {w:"quant à",d:"pour ce qui est de, en ce qui concerne",e:"Quant à la question salariale, elle reste entière.",tone:"neut"},
  {w:"c'est dire si",d:"formule d'insistance : cela montre bien à quel point",e:"C'est dire si la situation est préoccupante.",tone:"neut"},

function renderCards(containerId, data){
  const g=document.getElementById(containerId);
  g.innerHTML=data.map(item=>`
    <div class="card" data-text="${(item.w+' '+item.d+' '+item.e).toLowerCase()}">
      <div class="word">${item.w}</div>
      <div class="def">${item.d}</div>
      <div class="ex">${item.e}</div>
      <span class="tag t-${item.tone}">${item.tone==='pos'?'valorisant':item.tone==='neg'?'péjoratif':'neutre'}</span>
    </div>`).join('');
  updateCount(containerId.replace('-grid',''), data.length);
}

function updateCount(panelId, n){
  const el=document.getElementById(panelId+'-count');
  if(el) el.textContent=n+' entrée'+(n>1?'s':'');
}

function filterCards(panelId, val){
  const q=val.toLowerCase().trim();
  const cards=document.querySelectorAll(`#${panelId}-grid .card`);
  let n=0;
  cards.forEach(c=>{
    const show=!q||c.dataset.text.includes(q);
    c.classList.toggle('hidden',!show);
    if(show) n++;
  });
  updateCount(panelId,n);
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['adj','conn'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===id));
}

renderCards('adj-grid', adjectifs);
renderCards('conn-grid', connecteurs);
</script>
